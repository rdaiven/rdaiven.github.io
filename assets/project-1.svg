  <rect x="160" y="40" width="170" height="80" rx="12" fill="#ffffff" opacity=".05" stroke="#ffffff" stroke-opacity=".12"/>
  <rect x="350" y="40" width="170" height="80" rx="12" fill="#ffffff" opacity=".05" stroke="#ffffff" stroke-opacity=".12"/>
  <rect x="540" y="40" width="220" height="80" rx="12" fill="#ffffff" opacity=".05" stroke="#ffffff" stroke-opacity=".12"/>
  <text x="180" y="78" fill="#34e2a8" font-size="26" font-weight="600">OAuth</text>
