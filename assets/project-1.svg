      <stop offset="0" stop-color="#10131b"/><stop offset="1" stop-color="#0a0c12"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#34e2a8" stop-opacity=".15"/><stop offset="1" stop-color="#34e2a8"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg1)"/>
  <!-- sidebar -->
  <rect x="0" y="0" width="120" height="500" fill="#ffffff" opacity=".03"/>
  <rect x="24" y="40" width="72" height="12" rx="6" fill="#34e2a8" opacity=".5"/>
  <rect x="24" y="80" width="72" height="10" rx="5" fill="#ffffff" opacity=".12"/>
  <rect x="24" y="110" width="56" height="10" rx="5" fill="#ffffff" opacity=".12"/>
  <rect x="24" y="140" width="64" height="10" rx="5" fill="#ffffff" opacity=".12"/>
