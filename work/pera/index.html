<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PERA — envelope budgeting</title>
  <meta name="description" content="PERA — a monthly envelope budgeting mini app. Every peso has an envelope.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@500;700&family=Fragment+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="app-header">
    <div class="brand">
      <p class="wordmark" aria-label="PERA"><span class="peso-glyph" aria-hidden="true">₱</span><span aria-hidden="true">ERA</span></p>
      <p class="tagline">Every peso has an envelope.</p>
    </div>

    <nav class="month-nav" aria-label="Month">
      <button type="button" class="month-btn" id="prev-month" aria-label="Previous month">
        <svg viewBox="0 0 16 16" width="16" height="16" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 3 5 8l5 5"/></svg>
      </button>
      <h1 class="month-label num" id="month-label">—</h1>
      <button type="button" class="month-btn" id="next-month" aria-label="Next month">
        <svg viewBox="0 0 16 16" width="16" height="16" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 3 5 5-5 5"/></svg>
      </button>
    </nav>

    <button type="button" class="btn btn-primary btn-expense" id="open-expense">
      <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 3v10M3 8h10"/></svg>
      Expense
    </button>
  </header>

  <main class="app-main">

    <section class="summary" aria-label="Month summary">
      <div class="summary-item">
        <span class="summary-label">Budgeted</span>
        <span class="summary-num num" id="sum-budgeted">₱0.00</span>
      </div>
      <div class="summary-item">
        <span class="summary-label">Spent</span>
        <span class="summary-num num" id="sum-spent">₱0.00</span>
      </div>
      <div class="summary-item">
        <span class="summary-label">Left to spend</span>
        <span class="summary-num num" id="sum-left">₱0.00</span>
      </div>
    </section>

    <div class="panes">
      <section class="envelopes" aria-labelledby="env-heading">
        <div class="section-head">
          <h2 id="env-heading">Envelopes</h2>
          <button type="button" class="btn btn-ghost" id="open-new-envelope">+ New envelope</button>
        </div>
        <div id="rollover-slot"></div>
        <div class="env-grid" id="env-grid"></div>
      </section>

      <section class="transactions" aria-labelledby="tx-heading">
        <div class="section-head">
          <h2 id="tx-heading">Transactions</h2>
          <span class="tx-count num" id="tx-count"></span>
        </div>
        <ul class="tx-list" id="tx-list"></ul>
      </section>
    </div>

    <section class="data-row" aria-label="Data">
      <button type="button" class="btn btn-ghost" id="export-btn">Export JSON</button>
      <button type="button" class="btn btn-ghost" id="import-btn">Import JSON</button>
      <input type="file" id="import-file" accept="application/json,.json" class="visually-hidden" tabindex="-1" aria-hidden="true">
    </section>

  </main>

  <footer class="app-footer">
    <p>© 2026 PERA — a working mini app. Part of the Daiven Reyes Prototype Lab</p>
    <a href="../index.html">← Prototype Lab</a>
  </footer>

  <!-- Expense modal -->
  <div class="modal-backdrop" id="expense-modal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="expense-title">
      <div class="modal-head">
        <h2 id="expense-title">Log expense</h2>
        <button type="button" class="icon-btn" data-close-modal aria-label="Close">
          <svg viewBox="0 0 16 16" width="16" height="16" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="m4 4 8 8M12 4l-8 8"/></svg>
        </button>
      </div>
      <form id="expense-form" novalidate>
        <div class="field">
          <label for="exp-amount">Amount (₱)</label>
          <input type="number" id="exp-amount" name="amount" inputmode="decimal" min="0.01" step="0.01" placeholder="0.00" required>
        </div>
        <div class="field">
          <label for="exp-envelope">Envelope</label>
          <select id="exp-envelope" name="envelope" required></select>
        </div>
        <div class="field">
          <label for="exp-note">Note <span class="optional">(optional)</span></label>
          <input type="text" id="exp-note" name="note" maxlength="80" placeholder="e.g. palengke run">
        </div>
        <div class="field">
          <label for="exp-date">Date</label>
          <input type="date" id="exp-date" name="date" required>
        </div>
        <p class="form-error" id="expense-error" role="alert" hidden></p>
        <button type="submit" class="btn btn-primary btn-block">Add expense</button>
      </form>
    </div>
  </div>

  <!-- Envelope modal -->
  <div class="modal-backdrop" id="envelope-modal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="envelope-title">
      <div class="modal-head">
        <h2 id="envelope-title">New envelope</h2>
        <button type="button" class="icon-btn" data-close-modal aria-label="Close">
          <svg viewBox="0 0 16 16" width="16" height="16" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="m4 4 8 8M12 4l-8 8"/></svg>
        </button>
      </div>
      <form id="envelope-form" novalidate>
        <input type="hidden" id="env-id" name="id" value="">
        <div class="field">
          <label for="env-name">Name</label>
          <input type="text" id="env-name" name="name" maxlength="40" placeholder="e.g. Groceries" required>
        </div>
        <div class="field">
          <label for="env-budget">Monthly budget (₱)</label>
          <input type="number" id="env-budget" name="budget" inputmode="decimal" min="0.01" step="0.01" placeholder="0.00" required>
        </div>
        <fieldset class="field swatch-field">
          <legend>Color</legend>
          <div class="swatches" id="env-swatches"></div>
        </fieldset>
        <p class="form-error" id="envelope-error" role="alert" hidden></p>
        <button type="submit" class="btn btn-primary btn-block" id="env-submit">Create envelope</button>
        <button type="button" class="btn btn-danger btn-block" id="env-delete" data-action="delete-envelope" hidden>Delete envelope</button>
      </form>
    </div>
  </div>

  <div class="toasts" id="toasts" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
